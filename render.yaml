services:
  - type: web
    name: bitrix24-claude-api
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DAILY_REPORT_ENABLED
        value: "false"
      - key: BITRIX24_WEBHOOK_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: CLAUDE_MAX_TOKENS
        value: "4096"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CONNECTOR_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DAILY_REPORT_TIMEZONE
        value: Asia/Tashkent
      - key: DAILY_REPORT_AGENT
        value: ceo
