<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Executive Platform</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>AI Executive Platform</h1>
      <p class="subtitle">Agent Dashboard</p>
      <nav id="agent-list" class="agent-list"></nav>
      <button id="clear-chat" class="secondary">Clear chat</button>
    </aside>

    <main class="chat-panel">
      <header class="chat-header">
        <h2 id="active-agent-label">CEO Agent</h2>
      </header>

      <section id="chat-messages" class="chat-messages"></section>

      <div id="loading" class="loading hidden">AI tahlil qilmoqda...</div>
      <div id="error" class="error hidden"></div>

      <footer class="chat-input-area">
        <textarea id="message-input" placeholder="Savolingizni yozing..." rows="3"></textarea>
        <button id="send-btn">Send</button>
      </footer>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
